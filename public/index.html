<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NOVA VPS | Future Cloud Infrastructure</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 20% 30%, #0a0f1e, #03050b);
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated tech background */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format');
      background-size: cover;
      background-position: center;
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
      filter: blur(2px) brightness(0.6);
    }

    /* Grid overlay effect */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    /* Header futuristic */
    .header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeInDown 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .glow-text {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, #00e0ff, #7a2eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
      text-shadow: 0 0 30px rgba(0, 224, 255, 0.3);
    }

    .sub {
      color: rgba(255,255,255,0.6);
      margin-top: 0.5rem;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    /* Toggle Switch Futuristic */
    .toggle-container {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .toggle-btn {
      background: rgba(10, 20, 40, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 255, 0.3);
      padding: 0.8rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    .toggle-btn.active {
      background: linear-gradient(135deg, #00e0ff, #7a2eff);
      border-color: transparent;
      color: white;
      box-shadow: 0 0 20px rgba(0, 224, 255, 0.5);
    }

    /* Cards */
    .card {
      background: rgba(15, 25, 45, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      border: 1px solid rgba(0, 255, 255, 0.2);
      padding: 2rem;
      transition: all 0.3s ease;
      animation: fadeInUp 0.6s ease;
    }

    .card:hover {
      border-color: rgba(0, 255, 255, 0.6);
      box-shadow: 0 0 30px rgba(0, 224, 255, 0.1);
    }

    /* Inputs */
    .input-group {
      margin-bottom: 1.5rem;
    }

    .input-group label {
      display: block;
      color: #a0f0ff;
      margin-bottom: 0.5rem;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .input-group input {
      width: 100%;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 20px;
      color: white;
      font-family: 'Monaco', monospace;
      transition: all 0.2s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #00e0ff;
      box-shadow: 0 0 12px rgba(0, 224, 255, 0.3);
    }

    .btn-primary {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #00e0ff, #7a2eff);
      border: none;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* VM Grid */
    .vm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .vm-card {
      background: rgba(10, 18, 30, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1px solid rgba(0, 255, 255, 0.25);
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .vm-card:hover {
      transform: translateY(-4px);
      border-color: #00e0ff;
      box-shadow: 0 10px 30px rgba(0, 224, 255, 0.2);
    }

    .vm-name {
      font-size: 1.3rem;
      font-weight: bold;
      color: #00e0ff;
    }

    .vm-expiry {
      font-size: 0.8rem;
      color: #ffaa44;
      margin-top: 0.5rem;
    }

    .vm-status {
      display: inline-block;
      margin-top: 0.8rem;
      font-size: 0.7rem;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      background: rgba(0,255,0,0.2);
      color: #0f0;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: #0a1220;
      border-radius: 32px;
      max-width: 500px;
      width: 90%;
      padding: 2rem;
      border: 1px solid #00e0ff;
    }

    .result-box {
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      padding: 1rem;
      margin: 1rem 0;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="glow-text">✦ NOVA VPS ✦</div>
    <div class="sub">Next‑Gen Cloud Infrastructure • 120Hz Neural Engine</div>
  </div>

  <div class="toggle-container">
    <div class="toggle-btn active" data-mode="create">🛸 Tạo VM</div>
    <div class="toggle-btn" data-mode="manage">📡 Quản lý VM</div>
  </div>

  <!-- CREATE VM PANEL -->
  <div id="createPanel" class="card">
    <h2 style="color:#00e0ff; margin-bottom:1rem;">🔐 Xác thực quyền truy cập</h2>
    <div class="input-group">
      <label>GitHub Token</label>
      <input type="password" id="githubToken" placeholder="github_pat_xxx...">
      <div style="font-size:0.7rem; color:#aaa; margin-top:5px;">Quyền: repo, workflow</div>
    </div>
    <div class="input-group">
      <label>Tailscale Auth Key</label>
      <input type="password" id="tailscaleKey" placeholder="tskey-xxx...">
    </div>
    <button class="btn-primary" id="createBtn">✨ Khởi tạo VM ngay</button>
    <div id="createResult" style="margin-top:1rem;"></div>
  </div>

  <!-- MANAGE VM PANEL -->
  <div id="managePanel" class="card hidden">
    <h2 style="color:#00e0ff; margin-bottom:1rem;">🖥️ Hạ tầng VM đang hoạt động</h2>
    <div id="vmList" class="vm-grid">
      <div style="color:#aaa; text-align:center;">Chưa có VM nào. Hãy tạo VM đầu tiên ✨</div>
    </div>
  </div>
</div>

<!-- Modal chi tiết VM -->
<div id="vmModal" class="modal">
  <div class="modal-content">
    <h2 style="color:#00e0ff;" id="modalTitle"></h2>
    <div id="modalBody"></div>
    <button class="btn-primary" id="closeModal" style="margin-top:1rem;">Đóng</button>
  </div>
</div>

<script>
  // === STATE ===
  let currentMode = 'create';
  let vms = JSON.parse(localStorage.getItem('nova_vms') || '[]');

  // === DOM elements ===
  const createPanel = document.getElementById('createPanel');
  const managePanel = document.getElementById('managePanel');
  const createBtn = document.getElementById('createBtn');
  const githubTokenInput = document.getElementById('githubToken');
  const tailscaleKeyInput = document.getElementById('tailscaleKey');
  const createResultDiv = document.getElementById('createResult');
  const vmListDiv = document.getElementById('vmList');
  const modal = document.getElementById('vmModal');
  const modalTitle = document.getElementById('modalTitle');
  const modalBody = document.getElementById('modalBody');

  // === SAVE VM ===
  function saveVMs() {
    localStorage.setItem('nova_vms', JSON.stringify(vms));
  }

  // === RENDER VM LIST ===
  function renderVMList() {
    if (!vmListDiv) return;
    if (vms.length === 0) {
      vmListDiv.innerHTML = '<div style="color:#aaa; text-align:center;">✨ Chưa có VM nào. Hãy tạo VM đầu tiên</div>';
      return;
    }
    vmListDiv.innerHTML = vms.map(vm => `
      <div class="vm-card" data-id="${vm.id}">
        <div class="vm-name">🖥️ ${vm.name}</div>
        <div class="vm-expiry">⏱️ Hết hạn: ${new Date(vm.expiresAt).toLocaleString()}</div>
        <div class="vm-status">● ${vm.status === 'creating' ? 'Đang khởi tạo' : 'Đang chạy'}</div>
      </div>
    `).join('');

    document.querySelectorAll('.vm-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = card.getAttribute('data-id');
        const vm = vms.find(v => v.id === id);
        if (vm) showVMDetails(vm);
      });
    });
  }

  // === SHOW VM DETAILS ===
  function showVMDetails(vm) {
    modalTitle.innerText = `🖥️ ${vm.name}`;
    modalBody.innerHTML = `
      <div class="result-box">
        <strong>🔗 Kết nối qua Tailscale:</strong><br>
        IP: Xem trong GitHub Actions logs<br>
        User: ${vm.username}<br>
        Pass: ${vm.password}
      </div>
      <div class="result-box">
        <strong>🌐 noVNC (Trình duyệt):</strong><br>
        <a href="${vm.novncUrl}" target="_blank" style="color:#0ff;">${vm.novncUrl}</a><br>
        Mật khẩu: ${vm.password}
      </div>
      <div class="result-box">
        <strong>📅 Thời gian tạo:</strong> ${new Date(vm.createdAt).toLocaleString()}<br>
        <strong>⏳ Kết thúc:</strong> ${new Date(vm.expiresAt).toLocaleString()}<br>
        <strong>📦 Repo:</strong> <a href="${vm.repoUrl}" target="_blank" style="color:#0ff;">GitHub</a>
      </div>
    `;
    modal.style.display = 'flex';
  }

  // === CREATE VM ===
  createBtn.addEventListener('click', async () => {
    const githubToken = githubTokenInput.value.trim();
    const tailscaleKey = tailscaleKeyInput.value.trim();

    if (!githubToken || !tailscaleKey) {
      createResultDiv.innerHTML = '<div style="color:#ff7777;">❌ Vui lòng nhập đầy đủ token và key</div>';
      return;
    }

    createBtn.disabled = true;
    createBtn.innerText = '🌀 Đang khởi tạo...';

    try {
      const res = await fetch('/api/vpsuser', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ githubToken, tailscaleKey })
      });
      const data = await res.json();

      if (data.success) {
        const newVM = {
          id: data.id,
          name: data.name,
          repoUrl: data.repoUrl,
          actionsUrl: data.actionsUrl,
          novncUrl: data.novncUrl,
          username: data.username,
          password: data.password,
          createdAt: data.createdAt,
          expiresAt: data.expiresAt,
          status: data.status
        };
        vms.unshift(newVM);
        saveVMs();
        renderVMList();

        createResultDiv.innerHTML = `<div style="color:#0f0;">✅ ${data.name} đã được tạo! Vào phần Quản lý VM để xem chi tiết.</div>`;
        githubTokenInput.value = '';
        tailscaleKeyInput.value = '';

        // Chuyển sang tab quản lý
        document.querySelector('[data-mode="manage"]').click();
      } else {
        createResultDiv.innerHTML = `<div style="color:#ff7777;">❌ Lỗi: ${data.error} (${data.code || 'UNKNOWN'})</div>`;
      }
    } catch (err) {
      createResultDiv.innerHTML = `<div style="color:#ff7777;">❌ Lỗi kết nối: ${err.message}</div>`;
    } finally {
      createBtn.disabled = false;
      createBtn.innerText = '✨ Khởi tạo VM ngay';
    }
  });

  // === TOGGLE MODE ===
  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMode = btn.getAttribute('data-mode');

      if (currentMode === 'create') {
        createPanel.classList.remove('hidden');
        managePanel.classList.add('hidden');
      } else {
        createPanel.classList.add('hidden');
        managePanel.classList.remove('hidden');
        renderVMList();
      }
    });
  });

  // Modal close
  document.getElementById('closeModal').addEventListener('click', () => {
    modal.style.display = 'none';
  });
  window.addEventListener('click', (e) => {
    if (e.target === modal) modal.style.display = 'none';
  });

  // Initial render
  renderVMList();
</script>
</body>
</html>
