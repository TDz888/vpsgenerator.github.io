<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS 4-16 GENERATOR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        h1 span { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        #status { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .note { font-size: 12px; color: #999; margin-top: 20px; text-align: center; }
        .note a { color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖥 <span>VPS 4-16 GENERATOR</span> 🚀</h1>
        <p class="subtitle">Tạo VPS Windows 11 miễn phí</p>
        
        <div class="form-group">
            <label>🔑 GitHub Token (cần quyền repo + workflow)</label>
            <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
        </div>
        
        <div class="form-group">
            <label>⏱️ Thời gian sử dụng</label>
            <select id="duration">
                <option value="30m">30 phút</option>
                <option value="1h" selected>1 giờ</option>
                <option value="2h">2 giờ</option>
                <option value="4h">4 giờ</option>
                <option value="6h">6 giờ</option>
            </select>
        </div>
        
        <button id="createBtn" onclick="createVPS()">🚀 TẠO VPS NGAY</button>
        
        <div id="status"></div>
        
        <div class="note">
            🔒 Token chỉ dùng để tạo repo và workflow, không lưu lại.<br>
            📖 Cần token có quyền <strong>repo</strong> và <strong>workflow</strong>.<br>
            <a href="https://github.com/settings/tokens" target="_blank">Tạo token tại đây</a>
        </div>
    </div>
    
    <script>
        async function createVPS() {
            const btn = document.getElementById('createBtn');
            const statusDiv = document.getElementById('status');
            const githubToken = document.getElementById('githubToken').value;
            const duration = document.getElementById('duration').value;
            
            if (!githubToken) {
                statusDiv.style.display = 'block';
                statusDiv.className = 'error';
                statusDiv.innerHTML = '❌ Vui lòng nhập GitHub Token';
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Đang tạo VPS...';
            
            statusDiv.style.display = 'block';
            statusDiv.className = 'info';
            statusDiv.innerHTML = '🔄 Đang khởi tạo VPS... (có thể mất 1-2 phút)';
            
            try {
                const response = await fetch('/api/vpsuser', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userToken: githubToken, duration })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    statusDiv.className = 'success';
                    statusDiv.innerHTML = '✅ ' + data.message + '<br>📁 Repo: <a href="' + data.repoUrl + '" target="_blank">' + data.repoUrl + '</a><br>📊 Xem tab Actions để theo dõi tiến trình.<br>🔗 Link VNC sẽ xuất hiện trong file remote-link.txt khi hoàn tất.';
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                statusDiv.className = 'error';
                statusDiv.innerHTML = '❌ Lỗi: ' + error.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 TẠO VPS NGAY';
            }
        }
    </script>
</body>
</html>
