<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS 4-16 GENERATOR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        h1 { font-size: 28px; text-align: center; margin-bottom: 8px; }
        h1 span { background: linear-gradient(135deg, #667eea, #764ba2); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .sub { text-align: center; color: #6b7280; margin-bottom: 32px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #374151; }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 14px;
            transition: all 0.2s;
        }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 24px;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.1s;
        }
        button:hover { transform: scale(1.02); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        #status {
            margin-top: 24px;
            padding: 16px;
            border-radius: 16px;
            display: none;
            font-size: 14px;
            line-height: 1.5;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .info { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .footer {
            margin-top: 32px;
            font-size: 12px;
            text-align: center;
            color: #9ca3af;
        }
        .footer a { color: #667eea; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <h1>🖥 <span>VPS 4-16 GENERATOR</span> 🚀</h1>
    <div class="sub">Tạo VPS Windows 11 miễn phí</div>

    <div class="form-group">
        <label>🔑 GitHub Token</label>
        <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
    </div>

    <div class="form-group">
        <label>⏱️ Thời gian</label>
        <select id="duration">
            <option value="30m">30 phút</option>
            <option value="1h" selected>1 giờ</option>
            <option value="2h">2 giờ</option>
            <option value="4h">4 giờ</option>
            <option value="6h">6 giờ</option>
        </select>
    </div>

    <button id="btn" onclick="createVPS()">🚀 TẠO VPS NGAY</button>
    <div id="status"></div>
    <div class="footer">
        🔒 Token chỉ dùng để tạo repo, không lưu lại.<br>
        Cần quyền <strong>repo</strong> + <strong>workflow</strong><br>
        <a href="https://github.com/settings/tokens" target="_blank">Tạo token tại đây</a>
    </div>
</div>

<script>
    async function createVPS() {
        const btn = document.getElementById('btn');
        const statusDiv = document.getElementById('status');
        const token = document.getElementById('token').value;
        const duration = document.getElementById('duration').value;

        if (!token) {
            statusDiv.style.display = 'block';
            statusDiv.className = 'error';
            statusDiv.innerHTML = '❌ Vui lòng nhập GitHub Token';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Đang tạo VPS...';
        statusDiv.style.display = 'block';
        statusDiv.className = 'info';
        statusDiv.innerHTML = '🔄 Đang khởi tạo VPS... (1-2 phút)';

        try {
            const res = await fetch('/api/vpsuser', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userToken: token, duration })
            });
            const data = await res.json();

            if (data.success) {
                statusDiv.className = 'success';
                statusDiv.innerHTML = `
                    ✅ ${data.message}<br><br>
                    📁 Repo: <a href="${data.repoUrl}" target="_blank">${data.repoUrl}</a><br>
                    📊 Actions: <a href="${data.actionsUrl}" target="_blank">Xem tiến trình</a><br>
                    🔐 VNC Password: <strong>vps123</strong><br>
                    📝 Sau khi workflow chạy xong, vào file <strong>vnc-link.txt</strong> để lấy link!
                `;
            } else {
                throw new Error(data.error);
            }
        } catch (err) {
            statusDiv.className = 'error';
            statusDiv.innerHTML = '❌ Lỗi: ' + err.message;
        } finally {
            btn.disabled = false;
            btn.innerHTML = '🚀 TẠO VPS NGAY';
        }
    }
</script>
</body>
</html>
