name: VPS Auto Deploy

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 tiếng
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup environment
        run: |
          echo "========================================="
          echo "VPS ĐANG CHẠY - Created by Hiếu Dz"
          echo "========================================="
          echo "Thời gian bắt đầu: $(date)"
          echo "Repo: ${{ github.repository }}"
      
      - name: Run VPS Service
        run: |
          while true; do
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] VPS is running..."
            echo "CPU Usage: $(top -bn1 | grep 'Cpu(s)' | awk '{print $2}' | cut -d'%' -f1)%"
            echo "Memory: $(free -h | awk 'NR==2{print $3 "/" $2}')"
            echo "Uptime: $(uptime)"
            echo "-----------------------------------------"
            sleep 60
          done
      
      - name: Keep alive
        if: always()
        run: |
          echo "VPS đã kết thúc - $(date)"
