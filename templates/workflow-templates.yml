name: Create VPS (Auto Restart)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [create-vps]

jobs:
  deploy:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup VNC + noVNC + Cloudflare
      shell: pwsh
      run: |
        Write-Host "=== Installing TightVNC ===" -ForegroundColor Cyan
        Invoke-WebRequest -Uri "https://www.tightvnc.com/download/2.8.63/tightvnc-2.8.63-gpl-setup-64bit.msi" -OutFile "tightvnc.msi"
        Start-Process msiexec.exe -Wait -ArgumentList '/i tightvnc.msi /quiet /norestart ADDLOCAL="Server" SET_PASSWORD=1 VALUE_OF_PASSWORD=vps123'
        
        Write-Host "=== Starting VNC Server ===" -ForegroundColor Cyan
        Start-Process "C:\Program Files\TightVNC\tvnserver.exe" -ArgumentList "-run"
        Start-Sleep 10
        
        Write-Host "=== Installing Cloudflared ===" -ForegroundColor Cyan
        Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"
        
        Write-Host "=== Starting Cloudflare Tunnel ===" -ForegroundColor Cyan
        Start-Process -FilePath "cloudflared.exe" -ArgumentList "tunnel", "--url", "http://localhost:5900", "--logfile", "tunnel.log" -WindowStyle Hidden
        
        Write-Host "=== Getting public URL ===" -ForegroundColor Cyan
        $url = $null
        for ($i = 1; $i -le 60; $i++) {
          Start-Sleep 2
          if (Test-Path "tunnel.log") {
            $log = Get-Content "tunnel.log" -Raw
            if ($log -match 'https://([a-z0-9-]+\.trycloudflare\.com)') {
              $url = $matches[0]
              break
            }
          }
        }
        
        if ($url) {
          Write-Host "✅ VNC URL: $url" -ForegroundColor Green
          $vncLink = "$url/vnc.html"
          $vncLink | Out-File -FilePath "vnc-link.txt"
          
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add vnc-link.txt
          git commit -m "Add VNC link" --allow-empty
          git push origin main
        } else {
          Write-Host "❌ Failed to get tunnel URL" -ForegroundColor Red
        }
        
        Write-Host "=== VPS is running for 330 minutes ===" -ForegroundColor Green
        for ($i = 1; $i -le 330; $i++) {
          Write-Host "🟢 Alive - $i/330 minutes" -ForegroundColor DarkCyan
          Start-Sleep 60
        }
