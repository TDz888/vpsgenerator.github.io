name: Create Windows VPS

on:
  workflow_dispatch:
    inputs:
      tailscale_key:
        description: 'Tailscale Auth Key'
        required: true
        type: string

jobs:
  setup-vm:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ inputs.tailscale_key }}
          version: 1.58.0
      
      - name: Get Tailscale IP
        id: tailscale
        run: |
          $ip = (tailscale ip -4).Trim()
          echo "ip=$ip" >> $env:GITHUB_OUTPUT
        shell: pwsh
      
      - name: Setup noVNC
        run: |
          # Cài đặt noVNC
          git clone https://github.com/novnc/noVNC.git C:\novnc
          git clone https://github.com/novnc/websockify.git C:\websockify
          
          # Cấu hình VNC server
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "UserAuthentication" -Value 0
          
          # Tạo user runneradmin
          net user runneradmin VPS@123456 /add
          net localgroup Administrators runneradmin /add
          net localgroup "Remote Desktop Users" runneradmin /add
          
          # Bật firewall cho VNC
          New-NetFirewallRule -DisplayName "VNC" -Direction Inbound -Protocol TCP -LocalPort 5900 -Action Allow
          New-NetFirewallRule -DisplayName "noVNC" -Direction Inbound -Protocol TCP -LocalPort 6080 -Action Allow
        shell: pwsh
      
      - name: Start noVNC
        run: |
          Start-Process -NoNewWindow python -ArgumentList "C:\websockify\websockify.py", "--web=C:\novnc", "6080", "localhost:5900"
        shell: pwsh
      
      - name: Display Connection Info
        run: |
          Write-Host "========================================"
          Write-Host "🖥️ WINDOWS VPS READY"
          Write-Host "========================================"
          Write-Host "Tailscale IP: ${{ steps.tailscale.outputs.ip }}"
          Write-Host "Username: runneradmin"
          Write-Host "Password: VPS@123456"
          Write-Host ""
          Write-Host "🔗 noVNC URL: http://${{ steps.tailscale.outputs.ip }}:6080/vnc.html"
          Write-Host "========================================"
        shell: pwsh
      
      - name: Keep VM Alive
        run: |
          # Giữ VM chạy trong 6 giờ
          $endTime = (Get-Date).AddHours(6)
          while ((Get-Date) -lt $endTime) {
            Write-Host "VM is running... $(Get-Date)"
            Start-Sleep -Seconds 300
          }
        shell: pwsh
